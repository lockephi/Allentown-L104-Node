name: L104-Sovereign-Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: {}

jobs:
  ping-node:
    runs-on: ubuntu-latest
    steps:
      - name: Re-awaken L104 Logic
        run: |
          curl -sf https://${{ secrets.CODESPACE_URL }}/health \
            -H "Content-Type: application/json" \
            -H "X-Evo-Stage: EVO_61_SYSTEM_UPGRADE" \
            || echo "Node unreachable"
